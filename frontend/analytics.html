<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Buddy — Analytics</title>
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="page-header">
  <div class="page-header-row max-w-3xl mx-auto">
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <circle cx="13" cy="13" r="11.5" stroke="var(--accent)" stroke-width="2"/>
        <circle cx="13" cy="13" r="6.5" stroke="var(--accent)" stroke-width="2"/>
        <circle cx="13" cy="13" r="2" fill="var(--accent)"/>
      </svg>
      <h1>Focus Buddy</h1>
    </a>
    <nav class="page-nav" aria-label="Main navigation">
      <a href="index.html">Today</a>
      <a href="analytics.html" class="active" aria-current="page">Analytics</a>
      <a href="#" id="about-nav" role="button">About me</a>
      <div class="settings-menu" style="position:relative">
        <button id="settings-btn" class="settings-trigger" aria-label="Settings" title="Settings" aria-haspopup="dialog" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </nav>
  </div>
</header>

<main id="analytics-main" class="max-w-3xl mx-auto px-6 py-8 flex flex-col gap-6">
  <div id="tiles" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
  <section id="today-card" class="card"></section>
  <section id="week-card" class="card"></section>
  <div>
    <p class="section-label">Session history</p>
    <div id="history-list" class="flex flex-col gap-3"></div>
  </div>
</main>

<!-- Unwind ritual modal -->
<div id="unwind-overlay" class="modal-overlay" style="display:none">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="unwind-title">
    <div class="flex items-start justify-between gap-3 mb-1">
      <h2 id="unwind-title" class="serif" style="font-size:1.15rem;font-weight:600;margin:0">Daily Unwind</h2>
      <button id="unwind-close" aria-label="Close" class="btn-ghost" style="padding:2px 9px;border:none;font-size:1rem;color:var(--text-muted)">✕</button>
    </div>
    <div class="flex items-center justify-between gap-3 mb-4">
      <p id="unwind-subtitle" class="text-xs" style="color:var(--text-faint);margin:0"></p>
      <div class="step-dots" id="unwind-dots"></div>
    </div>
    <div id="unwind-body"></div>
    <div class="flex items-center justify-between gap-3 mt-5">
      <button id="unwind-back" class="btn-ghost">Back</button>
      <button id="unwind-next" class="btn-primary">Next</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/notify.js"></script>
<script src="js/settings-menu.js"></script>
<script>
  const ICON_TRASH = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>';

  const COLORS = {
    focused: '#5e8a65', distracted: '#b35c3a',
    uncertain: '#b08a38', away: '#8a7a6c',
  };

  /* ---------- formatting helpers ---------- */
  function formatSeconds(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}m ${sec}s`;
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, {
      month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit',
    });
  }
  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  }
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  // Doughnut used by the Daily Unwind ritual (step 1).
  function buildChart(session) {
    const ctx   = document.getElementById(`chart-${session.id}`).getContext('2d');
    // Destroy any prior chart on this canvas so re-rendering doesn't throw
    // "Canvas is already in use".
    const existing = Chart.getChart(ctx.canvas);
    if (existing) existing.destroy();
    const total = session.seconds_focused + session.seconds_distracted +
                  session.seconds_uncertain + session.seconds_away;
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Focused', 'Distracted', 'Uncertain', 'Away'],
        datasets: [{
          data: total === 0 ? [0, 0, 1, 0]
            : [session.seconds_focused, session.seconds_distracted,
               session.seconds_uncertain, session.seconds_away],
          backgroundColor: [COLORS.focused, COLORS.distracted, COLORS.uncertain, COLORS.away],
          borderWidth: 0, hoverOffset: 4,
        }],
      },
      options: {
        cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => `${c.label}: ${formatSeconds(c.raw)}` } },
        },
        animation: { duration: 0 },
      },
    });
  }

  /* ---------- date / aggregation helpers (local time) ---------- */
  let allSessions = [];
  let workPeriods = [];

  function pad2(n) { return String(n).padStart(2, '0'); }
  function localDayKey(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
  function parseDayKey(key) { const [y, m, dd] = key.split('-').map(Number); return new Date(y, m - 1, dd); }
  function mondayOf(d) {
    const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const dow = (date.getDay() + 6) % 7;   // Mon=0 … Sun=6
    date.setDate(date.getDate() - dow);
    return date;
  }
  function weekKeyOf(d) { return localDayKey(mondayOf(d)); }
  function formatHM(s) {
    s = Math.round(s);
    const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }
  function sumStates(list) {
    const r = { focused: 0, distracted: 0, uncertain: 0, away: 0 };
    list.forEach(s => {
      r.focused += s.seconds_focused; r.distracted += s.seconds_distracted;
      r.uncertain += s.seconds_uncertain; r.away += s.seconds_away;
    });
    r.total = r.focused + r.distracted + r.uncertain + r.away;
    return r;
  }
  function focusPct(sum) { return sum.total > 0 ? Math.round(sum.focused / sum.total * 100) : 0; }
  function findPeriod(kind, key) { return workPeriods.find(p => p.kind === kind && p.period_key === key) || null; }

  function legendRows(sum) {
    const row = (cls, label, val) =>
      `<div class="flex items-center justify-between"><span class="flex items-center"><span class="dot dot-${cls}"></span>${label}</span>` +
      `<span style="color:var(--text-muted);font-variant-numeric:tabular-nums">${formatSeconds(val)} · ${sum.total > 0 ? Math.round(val / sum.total * 100) : 0}%</span></div>`;
    return row('focused', 'Focused', sum.focused) + row('distracted', 'Distracted', sum.distracted) +
           row('uncertain', 'Uncertain', sum.uncertain) + row('away', 'Away', sum.away);
  }
  const WK_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const WK_LONG  = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

  function weekDays() {
    const monday = mondayOf(new Date());
    const todayKey = localDayKey(new Date());
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
      const key = localDayKey(d);
      const focused = allSessions
        .filter(s => localDayKey(new Date(s.started_at)) === key)
        .reduce((a, s) => a + s.seconds_focused, 0);
      days.push({ key, focused, isToday: key === todayKey, isFuture: parseDayKey(key) > parseDayKey(todayKey), ended: !!findPeriod('day', key) });
    }
    return days;
  }
  function weekBarsHtml(days) {
    const maxF = Math.max(1, ...days.map(x => x.focused));
    return `<div class="week-bars">${days.map((x, i) => {
      const h = x.focused > 0 ? Math.max(4, Math.round(x.focused / maxF * 100)) : 0;
      return `<div class="week-bar ${x.isToday ? 'today' : ''} ${x.isFuture ? 'future' : ''}">
        <div class="week-bar-track"><div class="week-bar-fill" style="height:${h}%"></div></div>
        <span class="week-bar-label">${WK_SHORT[i]}${x.ended ? ' ✓' : ''}</span>
        <span class="week-bar-val">${x.focused > 0 ? formatHM(x.focused) : '—'}</span>
      </div>`;
    }).join('')}</div>`;
  }

  /* ---------- dashboard renderers ---------- */
  function computeStreak() {
    const set = new Set(allSessions.map(s => localDayKey(new Date(s.started_at))));
    if (set.size === 0) return 0;
    const t = new Date();
    let cursor = new Date(t.getFullYear(), t.getMonth(), t.getDate());
    if (!set.has(localDayKey(cursor))) {          // today blank → streak can still run up to yesterday
      cursor.setDate(cursor.getDate() - 1);
      if (!set.has(localDayKey(cursor))) return 0;
    }
    let streak = 0;
    while (set.has(localDayKey(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
    return streak;
  }
  function personalBest() {
    const byDay = {};
    allSessions.forEach(s => {
      const k = localDayKey(new Date(s.started_at));
      byDay[k] = (byDay[k] || 0) + s.seconds_focused;
    });
    return Object.values(byDay).reduce((m, v) => Math.max(m, v), 0);
  }

  function renderTiles() {
    const todayKey = localDayKey(new Date());
    const today = allSessions.filter(s => localDayKey(new Date(s.started_at)) === todayKey);
    const tSum = sumStates(today);
    const weekKey = weekKeyOf(new Date());
    const week = allSessions.filter(s => weekKeyOf(new Date(s.started_at)) === weekKey);
    const wSum = sumStates(week);
    const streak = computeStreak();
    const best = personalBest();

    const tile = (label, value, sub) => `
      <div class="card" style="padding:1rem 1.1rem">
        <p class="section-label" style="margin:0 0 6px">${label}</p>
        <p class="serif" style="font-size:1.5rem;font-weight:700;color:var(--text);line-height:1;margin:0">${value}</p>
        <p class="text-xs" style="color:var(--text-faint);margin:4px 0 0">${sub}</p>
      </div>`;

    document.getElementById('tiles').innerHTML =
      tile('Today', focusPct(tSum) + '%', formatHM(tSum.focused) + ' focused') +
      tile('This week', focusPct(wSum) + '%', formatHM(wSum.focused) + ' focused') +
      tile('Streak', '🔥 ' + streak, streak === 0 ? 'Start today' : (streak === 1 ? 'day in a row' : 'days in a row')) +
      tile('Personal best', best > 0 ? formatHM(best) : '0m', best > 0 ? 'focused in a day' : 'No focus yet');
  }

  function renderToday() {
    const el = document.getElementById('today-card');
    const todayKey = localDayKey(new Date());
    const today = allSessions.filter(s => localDayKey(new Date(s.started_at)) === todayKey);
    const sum = sumStates(today);
    const period = findPeriod('day', todayKey);
    const has = today.length > 0;
    const dateStr = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });

    el.innerHTML = `
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div>
          <p class="section-label" style="margin:0 0 2px">Daily unwind · ${dateStr}</p>
          <p class="text-sm" style="color:var(--text-muted);margin:0">
            ${has ? `${formatHM(sum.focused)} focused across ${today.length} session${today.length !== 1 ? 's' : ''}` : 'No focus sessions yet today.'}
          </p>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          ${period ? '<span class="badge badge-focused">Unwound ✓</span>' : ''}
          <button id="end-day-btn" class="btn-primary" ${has ? '' : 'disabled style="opacity:0.5;cursor:not-allowed"'}>${period ? 'Re-open unwind' : 'End day · Daily Unwind'} →</button>
        </div>
      </div>
      ${period && period.reflection ? `<p class="text-xs mt-3" style="color:var(--text-muted);border-left:3px solid var(--sage);padding-left:0.6rem;line-height:1.5">${escapeHtml(period.reflection)}</p>` : ''}`;

    if (has) document.getElementById('end-day-btn').addEventListener('click', () => openUnwind('day'));
  }

  function renderWeek() {
    const el = document.getElementById('week-card');
    const monday = mondayOf(new Date());
    const weekKey = localDayKey(monday);
    const days = weekDays();
    const week = allSessions.filter(s => weekKeyOf(new Date(s.started_at)) === weekKey);
    const sum = sumStates(week);
    const period = findPeriod('week', weekKey);
    const end = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + 6);
    const rangeStr = `${monday.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} – ${end.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}`;
    const disabled = sum.total === 0;

    el.innerHTML = `
      <div class="flex items-center justify-between gap-3 mb-4 flex-wrap">
        <p class="section-label" style="margin:0">Focus by day · ${rangeStr}</p>
        ${period ? '<span class="badge badge-focused">Week unwound ✓</span>' : ''}
      </div>
      ${weekBarsHtml(days)}
      <div class="flex justify-end mt-4">
        <button id="end-week-btn" class="btn-primary" ${disabled ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>${period ? 'Re-open weekly unwind' : 'End week · Weekly Unwind'} →</button>
      </div>
      ${period && period.reflection ? `<p class="text-xs mt-3" style="color:var(--text-muted);border-left:3px solid var(--sage);padding-left:0.6rem;line-height:1.5">${escapeHtml(period.reflection)}</p>` : ''}`;

    if (!disabled) document.getElementById('end-week-btn').addEventListener('click', () => openUnwind('week'));
  }

  // One compact line per session: time · focus bar · focus% · duration.
  function compactRow(session, isFirst) {
    const total = session.seconds_focused + session.seconds_distracted +
                  session.seconds_uncertain + session.seconds_away;
    const pct = total > 0 ? Math.round(session.seconds_focused / total * 100) : 0;
    const row = document.createElement('div');
    row.className = 'flex items-center justify-between gap-3 text-sm';
    row.style.cssText = 'padding:0.6rem 0;' + (isFirst ? '' : 'border-top:1px solid var(--border)');
    row.innerHTML = `
      <div class="min-w-0 flex-1">
        <p class="truncate" style="color:var(--text);margin:0">${escapeHtml(session.task_name || 'Untitled')}</p>
        <p style="color:var(--text-faint);font-variant-numeric:tabular-nums;margin:1px 0 0;font-size:0.72rem">${formatTime(session.started_at)}</p>
      </div>
      <div class="flex items-center gap-2.5 flex-shrink-0">
        <div style="width:72px;height:8px;background:var(--surface-2);border-radius:99px;overflow:hidden" title="${pct}% focused">
          <div style="height:100%;width:${pct}%;background:var(--sage)"></div>
        </div>
        <span style="width:36px;text-align:right;color:var(--text);font-variant-numeric:tabular-nums">${pct}%</span>
        <span style="width:54px;text-align:right;color:var(--text-faint);font-variant-numeric:tabular-nums">${formatSeconds(total)}</span>
        <button class="icon-btn danger" data-del-session="${session.id}" aria-label="Delete this session" title="Delete session">${ICON_TRASH}</button>
      </div>`;
    return row;
  }

  function renderHistory() {
    const wrap = document.getElementById('history-list');
    wrap.innerHTML = '';

    if (allSessions.length === 0) {
      wrap.innerHTML = `
        <div class="card flex flex-col items-center gap-2 text-center py-12">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
          <p class="font-medium text-sm" style="color:var(--text)">No sessions yet</p>
          <p class="text-xs" style="color:var(--text-faint)">Complete a session on the <a href="index.html" style="color:var(--accent)">Today</a> page.</p>
        </div>`;
      return;
    }

    const byDay = new Map();
    allSessions.forEach(s => {
      const k = localDayKey(new Date(s.started_at));
      if (!byDay.has(k)) byDay.set(k, []);
      byDay.get(k).push(s);
    });
    const keys = [...byDay.keys()].sort().reverse();

    keys.forEach(key => {
      const sessions = byDay.get(key).slice().sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
      const focused  = sessions.reduce((a, s) => a + s.seconds_focused, 0);
      const dayDate  = parseDayKey(key);
      const label = `${dayDate.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' })} · ${sessions.length} session${sessions.length !== 1 ? 's' : ''} · ${formatHM(focused)} focused`;

      const group = document.createElement('div');
      group.className = 'card';
      group.style.padding = '0';

      const btn = document.createElement('button');
      btn.className = 'completed-header collapsed';   // all days collapsed by default
      btn.style.cssText = 'width:100%;justify-content:flex-start;padding:0.9rem 1.25rem;font-size:0.85rem;color:var(--text)';
      btn.setAttribute('aria-expanded', 'false');
      btn.innerHTML = `<span class="chev" style="display:inline-flex"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M6 9l6 6 6-6"/></svg></span> <span>${label}</span>`;

      const body = document.createElement('div');
      body.style.cssText = 'padding:0 1.25rem 0.5rem;display:none';
      sessions.forEach((s, i) => body.appendChild(compactRow(s, i === 0)));

      btn.addEventListener('click', () => {
        const collapsed = btn.classList.toggle('collapsed');
        btn.setAttribute('aria-expanded', String(!collapsed));
        body.style.display = collapsed ? 'none' : 'block';
      });

      group.appendChild(btn);
      group.appendChild(body);
      wrap.appendChild(group);
    });
  }

  function renderAll() {
    renderTiles();
    renderToday();
    renderWeek();
    renderHistory();
  }

  /* ---------- Unwind ritual (unchanged) ---------- */
  let unwind = { kind: null, step: 0, reflection: '', snapshot: null, finished: false };

  function openUnwind(kind) {
    const todayKey = localDayKey(new Date());
    const weekKey  = weekKeyOf(new Date());
    let sessions, periodKey;
    if (kind === 'day') { sessions = allSessions.filter(s => localDayKey(new Date(s.started_at)) === todayKey); periodKey = todayKey; }
    else                { sessions = allSessions.filter(s => weekKeyOf(new Date(s.started_at)) === weekKey); periodKey = weekKey; }
    const sum = sumStates(sessions);
    const existing = findPeriod(kind, periodKey);
    let aiRecap = null;
    if (existing && existing.ai_recap) { try { aiRecap = JSON.parse(existing.ai_recap); } catch (e) { aiRecap = null; } }
    unwind = { kind, step: 0, reflection: existing && existing.reflection ? existing.reflection : '', snapshot: { sessions, periodKey, sum }, finished: false, aiRecap, aiState: 'idle' };

    document.getElementById('unwind-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    renderUnwindStep();
    document.getElementById('unwind-next').focus();
  }

  function closeUnwind() {
    document.getElementById('unwind-overlay').style.display = 'none';
    document.body.style.overflow = '';
    closePomoSuggest();
  }

  function syncReflection() {
    const ta = document.getElementById('unwind-reflection');
    if (ta) unwind.reflection = ta.value;
  }

  // Daily unwind has an extra AI step; weekly is unchanged (3 steps).
  function unwindStepKeys(kind) {
    return kind === 'day' ? ['overview', 'tasks', 'ai', 'reflect'] : ['overview', 'weekbreak', 'ai', 'reflect'];
  }

  function dayTotalSecs() {
    const s = unwind.snapshot.sum;
    return (s.focused || 0) + (s.distracted || 0) + (s.uncertain || 0) + (s.away || 0);
  }

  // Average focus % over the last ~14 days, excluding today — the AI's "recent" baseline.
  function recentAvgFocusPct(excludeKey) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 14);
    const byDay = {};
    allSessions.forEach(s => {
      const d = new Date(s.started_at); if (d < cutoff) return;
      const k = localDayKey(d); if (k === excludeKey) return;
      const o = byDay[k] || (byDay[k] = { f: 0, t: 0 });
      o.f += s.seconds_focused || 0;
      o.t += (s.seconds_focused || 0) + (s.seconds_distracted || 0) + (s.seconds_uncertain || 0) + (s.seconds_away || 0);
    });
    const pcts = Object.values(byDay).filter(o => o.t > 0).map(o => 100 * o.f / o.t);
    return pcts.length ? pcts.reduce((a, b) => a + b, 0) / pcts.length : null;
  }

  function aiRecapHtml(r) {
    const section = (title, items) => (items && items.length)
      ? `<p class="section-label" style="margin:12px 0 4px">${title}</p>` +
        `<ul style="margin:0;padding-left:1.1rem;display:flex;flex-direction:column;gap:5px">` +
        items.map(x => `<li class="text-sm" style="color:var(--text);line-height:1.45">${escapeHtml(x)}</li>`).join('') + `</ul>`
      : '';
    const win = r.win ? `<p class="text-sm" style="color:var(--text);line-height:1.45;margin:10px 0 0;background:rgba(94,138,101,0.12);border-radius:8px;padding:8px 10px">🌱 <strong>Win:</strong> ${escapeHtml(r.win)}</p>` : '';
    const next = r.next_action ? `<p class="text-sm" style="color:var(--text);line-height:1.45;margin:12px 0 0;border-left:3px solid var(--sage);padding-left:10px"><strong>Tomorrow:</strong> ${escapeHtml(r.next_action)}</p>` : '';
    const shutdown = r.shutdown_question ? `<p class="text-sm" style="color:var(--text-muted);font-style:italic;line-height:1.5;margin:14px 0 0">${escapeHtml(r.shutdown_question)}</p>` : '';
    return `${r.summary ? `<p class="text-sm" style="color:var(--text);line-height:1.55;margin:0">${escapeHtml(r.summary)}</p>` : ''}
      ${win}
      ${section('Today vs your patterns', r.pattern_notes)}
      ${section('Advice', r.advice)}
      ${next}
      ${shutdown}`;
  }

  // Exact, app-computed stats for the day — shown with the advice so the AI step is
  // self-contained. Numbers come from the data, not the model.
  function aiStatsHtml() {
    const sum = unwind.snapshot.sum;
    return `<div style="padding:12px;background:var(--surface-2);border-radius:10px;margin-bottom:14px">
        <div class="flex items-center justify-between" style="margin-bottom:8px">
          <span class="serif" style="font-size:1.5rem;font-weight:700;color:var(--text);line-height:1">${focusPct(sum)}% <span class="text-xs" style="font-weight:400;color:var(--text-muted)">focused</span></span>
          <span class="text-xs" style="color:var(--text-faint);font-variant-numeric:tabular-nums">${formatHM(sum.focused)} focused · ${formatHM(sum.total)} tracked</span>
        </div>
        <div class="flex flex-col gap-1.5 text-xs">${legendRows(sum)}</div>
      </div>`;
  }

  function aiStepBody() {
    if (dayTotalSecs() < 120) {
      return '<p class="text-sm" style="color:var(--text-muted);line-height:1.55">Not enough tracked time today yet for AI insights — do a session and check back.</p>';
    }
    const stats = aiStatsHtml();
    if (unwind.aiState === 'loading') {
      return stats + '<p class="text-sm" style="color:var(--text-muted)">Thinking about your day…</p>';
    }
    if (unwind.aiState === 'error') {
      return stats + `<p class="text-sm" style="color:var(--clay, #b35c3a);line-height:1.5">Couldn't generate insights — is the backend running?</p>
        <button id="unwind-generate" class="btn-ghost" style="margin-top:10px">Try again</button>`;
    }
    if (unwind.aiRecap) {
      return stats + `${aiRecapHtml(unwind.aiRecap)}
        <button id="unwind-regenerate" class="btn-ghost" style="margin-top:14px;font-size:0.85rem">↻ Regenerate</button>`;
    }
    return stats + `<p class="text-sm mb-3" style="color:var(--text-muted);line-height:1.55">Let the AI review today against your learned patterns, recent days, and your most-focused hours.</p>
      <button id="unwind-generate" class="btn-primary">✨ Generate daily insights</button>`;
  }

  function generateUnwindAi() { return unwind.kind === 'day' ? generateDailyAi() : generateWeeklyAi(); }

  function wireAiStep() {
    const g = document.getElementById('unwind-generate');
    if (g) g.addEventListener('click', generateUnwindAi);
    const rg = document.getElementById('unwind-regenerate');
    if (rg) rg.addEventListener('click', generateUnwindAi);
    const op = document.getElementById('open-pomo-suggest');
    if (op) op.addEventListener('click', () => { if (unwind.aiRecap && unwind.aiRecap.pomodoro) openPomoSuggest(unwind.aiRecap.pomodoro); });
  }

  // ----- Weekly AI step -----
  function buildWeekDays() {
    const monday = mondayOf(new Date());
    const out = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
      const key = localDayKey(d);
      const sess = allSessions.filter(s => localDayKey(new Date(s.started_at)) === key);
      const agg = sumStates(sess);
      const byTask = {};
      sess.forEach(s => { const k = (s.task_name || '').trim() || 'Untitled'; byTask[k] = (byTask[k] || 0) + s.seconds_focused; });
      let top = null, mx = 0;
      for (const k in byTask) { if (byTask[k] > mx) { mx = byTask[k]; top = k; } }
      const dp = findPeriod('day', key);
      out.push({
        label: WK_LONG[i], date: key,
        seconds_focused: agg.focused, seconds_distracted: agg.distracted,
        seconds_uncertain: agg.uncertain, seconds_away: agg.away,
        top_task: mx > 0 ? top : null,
        daily_recap: (dp && dp.ai_recap) ? dp.ai_recap : null,
      });
    }
    return out;
  }

  function pomoSettings() {
    const fi = parseInt(localStorage.getItem('fb-pomo-focus'), 10);
    const bi = parseInt(localStorage.getItem('fb-pomo-break'), 10);
    return {
      pomo_focus_min: Number.isFinite(fi) ? fi : 25,
      pomo_break_min: Number.isFinite(bi) ? bi : 5,
      pomo_enabled: localStorage.getItem('fb-pomo-enabled') === 'on',
    };
  }

  function aiWeekRecapHtml(r) {
    const list = (title, items) => (items && items.length)
      ? `<p class="section-label" style="margin:12px 0 4px">${title}</p>` +
        `<ul style="margin:0;padding-left:1.1rem;display:flex;flex-direction:column;gap:5px">` +
        items.map(x => `<li class="text-sm" style="color:var(--text);line-height:1.45">${escapeHtml(x)}</li>`).join('') + `</ul>`
      : '';
    const theme = r.theme ? `<p class="serif" style="font-size:1.1rem;font-weight:700;color:var(--text);margin:0 0 6px">${escapeHtml(r.theme)}</p>` : '';
    const summary = r.summary ? `<p class="text-sm" style="color:var(--text);line-height:1.55;margin:0">${escapeHtml(r.summary)}</p>` : '';
    const pomoBtn = (r.pomodoro && r.pomodoro.recommend)
      ? `<button id="open-pomo-suggest" class="btn-ghost" style="margin-top:14px;font-size:0.85rem">⏱️ Tune my Pomodoro →</button>` : '';
    const nextWeek = r.next_week_focus
      ? `<p class="text-sm" style="color:var(--text);line-height:1.45;margin:12px 0 0;border-left:3px solid var(--sage);padding-left:10px"><strong>Focus for next week:</strong> ${escapeHtml(r.next_week_focus)}</p>` : '';
    return theme + summary + list('Insights', r.insights) + list('Areas to improve', r.improvements) +
      nextWeek + `<div style="margin-top:14px">${pomoBtn}</div>`;
  }

  function aiWeekStepBody() {
    if ((unwind.snapshot.sum.total || 0) < 300) {
      return '<p class="text-sm" style="color:var(--text-muted);line-height:1.55">Not enough tracked time this week yet for AI insights — check back after a few sessions.</p>';
    }
    if (unwind.aiState === 'loading') return '<p class="text-sm" style="color:var(--text-muted)">Reviewing your week…</p>';
    if (unwind.aiState === 'error') {
      return `<p class="text-sm" style="color:var(--clay, #b35c3a);line-height:1.5">Couldn't generate insights — is the backend running?</p>
        <button id="unwind-generate" class="btn-ghost" style="margin-top:10px">Try again</button>`;
    }
    if (unwind.aiRecap) {
      return aiWeekRecapHtml(unwind.aiRecap) +
        `<button id="unwind-regenerate" class="btn-ghost" style="margin-top:6px;font-size:0.85rem">↻ Regenerate</button>`;
    }
    return `<p class="text-sm mb-3" style="color:var(--text-muted);line-height:1.55">Let the AI review your whole week — your best day, trends, distraction patterns, and (if useful) better Pomodoro timings.</p>
      <button id="unwind-generate" class="btn-primary">✨ Generate weekly insights</button>`;
  }

  async function generateWeeklyAi() {
    unwind.aiState = 'loading'; renderUnwindStep();
    try {
      const r = await getWeeklyUnwind({ week_key: unwind.snapshot.periodKey, days: buildWeekDays(), ...pomoSettings() });
      unwind.aiRecap = {
        summary: r.summary || '', theme: r.theme || '', insights: r.insights || [],
        improvements: r.improvements || [], next_week_focus: r.next_week_focus || '',
        pomodoro: r.pomodoro || { recommend: false },
      };
      unwind.aiState = 'done';
      const sum = unwind.snapshot.sum;
      try {
        await createWorkPeriod({
          kind: 'week', period_key: unwind.snapshot.periodKey, ended_at: new Date().toISOString(),
          seconds_focused: sum.focused, seconds_distracted: sum.distracted,
          seconds_uncertain: sum.uncertain, seconds_away: sum.away,
          ai_recap: JSON.stringify(unwind.aiRecap),
        });
        workPeriods = await getWorkPeriods();
      } catch (e) { /* save failed but still show recap */ }
      renderUnwindStep();
      // AI-gated: open the Pomodoro popup beside the unwind only when recommended.
      if (unwind.aiRecap.pomodoro && unwind.aiRecap.pomodoro.recommend) openPomoSuggest(unwind.aiRecap.pomodoro);
    } catch (e) {
      unwind.aiState = 'error'; renderUnwindStep();
    }
  }

  // ----- Pomodoro recommendation popup (sits beside the unwind modal) -----
  function pomoEsc(e) { if (e.key === 'Escape') closePomoSuggest(); }
  function closePomoSuggest() {
    const el = document.getElementById('pomo-suggest');
    if (el) el.remove();
    document.removeEventListener('keydown', pomoEsc);
  }
  function clampStep(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function openPomoSuggest(pomo) {
    closePomoSuggest();
    let focus = clampStep(pomo.focus_min || 25, 10, 55);
    let brk = clampStep(pomo.break_min || 5, 5, 15);
    const el = document.createElement('div');
    el.id = 'pomo-suggest';
    el.style.cssText = 'position:fixed;right:24px;top:50%;transform:translateY(-50%);width:320px;max-width:calc(100vw - 32px);background:var(--surface);border:1px solid var(--border,#00000014);border-radius:16px;box-shadow:0 14px 44px rgba(0,0,0,0.2);padding:20px;z-index:1000';
    function stepper(label, val, which, unit) {
      return `<div class="flex items-center justify-between" style="margin-top:12px">
        <span class="text-sm" style="color:var(--text)">${label}</span>
        <span class="flex items-center" style="gap:10px">
          <button data-step="${which}:down" class="btn-ghost" style="width:34px;height:34px;padding:0;border-radius:9px;font-size:1.2rem;line-height:1">−</button>
          <span class="serif" style="font-weight:700;min-width:66px;text-align:center;color:var(--text);font-variant-numeric:tabular-nums">${val} ${unit}</span>
          <button data-step="${which}:up" class="btn-ghost" style="width:34px;height:34px;padding:0;border-radius:9px;font-size:1.2rem;line-height:1">+</button>
        </span></div>`;
    }
    function render() {
      el.innerHTML = `
        <div class="flex items-center justify-between" style="margin-bottom:6px">
          <h3 class="serif" style="font-size:1.1rem;font-weight:700;margin:0;color:var(--text)">⏱️ Suggested Pomodoro</h3>
          <button id="pomo-x" aria-label="Close" style="border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:1.1rem">✕</button>
        </div>
        <p class="text-xs" style="color:var(--text-muted);line-height:1.55;margin:0 0 8px">A Pomodoro alternates a focus block with a short break. Based on your week, the AI suggests these timings${pomo.why ? ':' : '.'}</p>
        ${pomo.why ? `<p class="text-xs" style="color:var(--text);line-height:1.5;margin:0 0 6px;border-left:3px solid var(--sage);padding-left:8px">${escapeHtml(pomo.why)}</p>` : ''}
        ${stepper('Focus', focus, 'focus', 'min')}
        ${stepper('Break', brk, 'break', 'min')}
        <button id="pomo-apply" class="btn-primary" style="width:100%;margin-top:18px">Apply &amp; turn on</button>
        <p class="text-xs" style="color:var(--text-faint);text-align:center;margin:8px 0 0">Focus 10–55 · Break 5–15 min</p>`;
      el.querySelector('#pomo-x').addEventListener('click', closePomoSuggest);
      el.querySelectorAll('[data-step]').forEach(b => b.addEventListener('click', () => {
        const [which, dir] = b.dataset.step.split(':');
        if (which === 'focus') focus = clampStep(focus + (dir === 'up' ? 5 : -5), 10, 55);
        else brk = clampStep(brk + (dir === 'up' ? 5 : -5), 5, 15);
        render();
      }));
      el.querySelector('#pomo-apply').addEventListener('click', () => {
        try {
          localStorage.setItem('fb-pomo-focus', String(focus));
          localStorage.setItem('fb-pomo-break', String(brk));
          localStorage.setItem('fb-pomo-enabled', 'on');
        } catch (e) {}
        const btn = el.querySelector('#pomo-apply');
        btn.textContent = 'Applied ✓'; btn.disabled = true;
        setTimeout(closePomoSuggest, 900);
      });
    }
    document.body.appendChild(el);
    render();
    document.addEventListener('keydown', pomoEsc);
  }

  async function generateDailyAi() {
    unwind.aiState = 'loading'; renderUnwindStep();
    try {
      const r = await getDailyUnwind({
        session_ids: unwind.snapshot.sessions.map(s => s.id),
        recent_avg_focus_pct: recentAvgFocusPct(unwind.snapshot.periodKey),
        period_key: unwind.snapshot.periodKey,
      });
      unwind.aiRecap = {
        summary: r.summary || '', win: r.win || '', pattern_notes: r.pattern_notes || [],
        advice: r.advice || [], next_action: r.next_action || '', shutdown_question: r.shutdown_question || '',
      };
      unwind.aiState = 'done';
      // Save with the day (reflection omitted → backend preserves it).
      const sum = unwind.snapshot.sum;
      try {
        await createWorkPeriod({
          kind: 'day', period_key: unwind.snapshot.periodKey, ended_at: new Date().toISOString(),
          seconds_focused: sum.focused, seconds_distracted: sum.distracted,
          seconds_uncertain: sum.uncertain, seconds_away: sum.away,
          ai_recap: JSON.stringify(unwind.aiRecap),
        });
        workPeriods = await getWorkPeriods();
      } catch (e) { /* save failed but still show the recap */ }
    } catch (e) {
      unwind.aiState = 'error';
    }
    renderUnwindStep();
  }

  function stepBody(kind, step) {
    const key = unwindStepKeys(kind)[step];
    const { sum, sessions } = unwind.snapshot;
    if (key === 'reflect') {
      const prompt = kind === 'day'
        ? 'What went well today? What pulled your focus?'
        : 'Big wins this week? What pulled your focus away? What did you learn?';
      return `<p class="text-sm mb-2" style="color:var(--text-muted)">${prompt}</p>
        <textarea id="unwind-reflection" class="input" rows="4" style="resize:vertical" placeholder="Optional — a sentence or two."></textarea>`;
    }
    if (key === 'ai') return kind === 'day' ? aiStepBody() : aiWeekStepBody();
    if (kind === 'day') {
      if (key === 'overview') {
        return `<div class="flex gap-5 items-center">
          <div class="relative flex-shrink-0" style="width:120px;height:120px">
            <canvas id="chart-unwind" width="120" height="120"></canvas>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
              <span style="font-size:1.1rem;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums">${focusPct(sum)}%</span>
            </div>
          </div>
          <div class="w-full">
            <p class="serif" style="font-size:1.2rem;font-weight:700;margin:0 0 8px;line-height:1.25">You focused for ${formatHM(sum.focused)} today.</p>
            <div class="flex flex-col gap-1.5 text-xs">${legendRows(sum)}</div>
          </div>
        </div>`;
      }
      const byTask = new Map();
      sessions.forEach(s => { const k = (s.task_name || '').trim() || 'Untitled'; byTask.set(k, (byTask.get(k) || 0) + s.seconds_focused); });
      const rows = [...byTask.entries()].sort((a, b) => b[1] - a[1]);
      const maxV = Math.max(1, ...rows.map(r => r[1]));
      const top = rows.length && rows[0][1] > 0 ? rows[0][0] : null;
      return `${top ? `<p class="text-sm mb-3" style="color:var(--text-muted)">Your most focused task today was <span style="color:var(--text);font-weight:600">${escapeHtml(top)}</span>.</p>` : ''}
        <div class="flex flex-col gap-2.5">
          ${rows.map(([name, sec]) => `
            <div>
              <div class="flex items-center justify-between text-sm mb-1"><span class="truncate">${escapeHtml(name)}</span><span style="color:var(--text-muted);font-variant-numeric:tabular-nums">${formatHM(sec)}</span></div>
              <div style="height:6px;background:var(--surface-2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${Math.max(4, Math.round(sec / maxV * 100))}%;background:var(--sage)"></div></div>
            </div>`).join('')}
        </div>`;
    }
    if (key === 'overview') {
      const days = weekDays();
      return `<p class="serif" style="font-size:1.2rem;font-weight:700;margin:0 0 12px;line-height:1.25">You focused for ${formatHM(sum.focused)} this week.</p>
        ${weekBarsHtml(days)}
        <p class="text-xs mt-3" style="color:var(--text-faint)">${focusPct(sum)}% of tracked time focused · ${formatHM(sum.total)} tracked</p>`;
    }
    const monday = mondayOf(new Date());
    const list = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
      const key = localDayKey(d);
      const f = allSessions.filter(s => localDayKey(new Date(s.started_at)) === key).reduce((a, s) => a + s.seconds_focused, 0);
      list.push({ label: WK_SHORT[i], focused: f });
    }
    const best = list.reduce((b, x) => x.focused > b.focused ? x : b, { focused: -1 });
    const maxV = Math.max(1, ...list.map(x => x.focused));
    return `<div class="flex flex-col gap-2.5">${list.map(x => {
      const isBest = x === best && x.focused > 0;
      const w = x.focused > 0 ? Math.max(4, Math.round(x.focused / maxV * 100)) : 0;
      return `<div>
          <div class="flex items-center justify-between text-sm mb-1">
            <span style="${isBest ? 'color:var(--sage);font-weight:600' : ''}">${x.label}${isBest ? ' · best day' : ''}</span>
            <span style="color:var(--text-muted);font-variant-numeric:tabular-nums">${x.focused > 0 ? formatHM(x.focused) : '—'}</span>
          </div>
          <div style="height:8px;background:var(--surface-2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${w}%;background:var(--sage);opacity:${isBest ? 1 : 0.5}"></div></div>
        </div>`;
    }).join('')}</div>`;
  }

  function renderUnwindStep() {
    const { kind, step } = unwind;
    document.getElementById('unwind-title').textContent = kind === 'day' ? 'Daily Unwind' : 'Weekly Unwind';
    if (kind === 'day') {
      document.getElementById('unwind-subtitle').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    } else {
      const m = mondayOf(new Date());
      const e = new Date(m.getFullYear(), m.getMonth(), m.getDate() + 6);
      document.getElementById('unwind-subtitle').textContent =
        `${m.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })} – ${e.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}`;
    }
    const keys = unwindStepKeys(kind);
    const key = keys[step];
    document.getElementById('unwind-dots').innerHTML = keys.map((_, i) => `<span class="step-dot ${i === step ? 'active' : ''}"></span>`).join('');
    document.getElementById('unwind-body').innerHTML = stepBody(kind, step);

    if (kind === 'day' && key === 'overview') {
      const sum = unwind.snapshot.sum;
      buildChart({ id: 'unwind', seconds_focused: sum.focused, seconds_distracted: sum.distracted, seconds_uncertain: sum.uncertain, seconds_away: sum.away });
    }
    if (key === 'reflect') { const ta = document.getElementById('unwind-reflection'); if (ta) ta.value = unwind.reflection; }
    if (key === 'ai') wireAiStep();

    document.getElementById('unwind-back').style.visibility = step === 0 ? 'hidden' : 'visible';
    document.getElementById('unwind-next').textContent = step === keys.length - 1 ? 'Finish unwind' : 'Next';
  }

  async function finishUnwind() {
    const nextBtn = document.getElementById('unwind-next');
    const { kind, snapshot, reflection } = unwind;
    const sum = snapshot.sum;
    nextBtn.disabled = true; nextBtn.textContent = 'Saving…';
    try {
      await createWorkPeriod({
        kind, period_key: snapshot.periodKey, ended_at: new Date().toISOString(),
        seconds_focused: sum.focused, seconds_distracted: sum.distracted,
        seconds_uncertain: sum.uncertain, seconds_away: sum.away, reflection: reflection || '',
      });
      workPeriods = await getWorkPeriods();
      unwind.finished = true;
      document.getElementById('unwind-dots').innerHTML = '';
      document.getElementById('unwind-body').innerHTML = `
        <div class="text-center py-6">
          <div style="font-size:2rem">🌿</div>
          <p class="serif" style="font-size:1.3rem;font-weight:700;margin:0.5rem 0 4px">${kind === 'day' ? 'Done for the day' : 'Week complete'} ✓</p>
          <p class="text-sm" style="color:var(--text-muted)">${kind === 'day'
            ? `You focused for ${formatHM(sum.focused)} today. Rest well.`
            : `You focused for ${formatHM(sum.focused)} this week. Nicely done.`}</p>
        </div>`;
      document.getElementById('unwind-back').style.visibility = 'hidden';
      nextBtn.disabled = false; nextBtn.textContent = 'Done';
    } catch {
      nextBtn.disabled = false; nextBtn.textContent = 'Finish unwind';
      alert('Could not save your unwind — is the backend running?');
    }
  }

  async function onUnwindNext() {
    if (unwind.finished) { closeUnwind(); renderAll(); return; }
    syncReflection();
    const keys = unwindStepKeys(unwind.kind);
    if (unwind.step < keys.length - 1) { unwind.step++; renderUnwindStep(); return; }
    await finishUnwind();
  }

  document.getElementById('unwind-next').addEventListener('click', onUnwindNext);
  document.getElementById('unwind-back').addEventListener('click', () => { syncReflection(); if (unwind.step > 0) { unwind.step--; renderUnwindStep(); } });
  document.getElementById('unwind-close').addEventListener('click', closeUnwind);
  document.getElementById('unwind-overlay').addEventListener('click', e => { if (e.target.id === 'unwind-overlay') closeUnwind(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('unwind-overlay').style.display === 'flex') closeUnwind(); });

  /* ---------- boot ---------- */
  async function loadAll() {
    const main = document.getElementById('analytics-main');
    try {
      [allSessions, workPeriods] = await Promise.all([getSessions(), getWorkPeriods()]);
    } catch {
      main.innerHTML = `
        <div class="card text-center py-6" style="border-color:var(--terracotta-soft)">
          <p class="text-sm font-medium" style="color:var(--terracotta)">Backend not running</p>
          <p class="text-xs mt-1" style="color:var(--text-muted)">
            <code style="background:var(--surface-2);padding:1px 5px;border-radius:4px">uvicorn backend.main:app --reload</code>
          </p>
        </div>`;
      return;
    }
    renderAll();
  }

  // Delete a session from any history row (delegated; #history-list persists across re-renders).
  document.getElementById('history-list').addEventListener('click', async (e) => {
    const del = e.target.closest('[data-del-session]');
    if (!del) return;
    const id = parseInt(del.dataset.delSession, 10);
    const ok = await confirmDialog("Delete this session? This can't be undone.", { danger: true, confirmText: 'Delete' });
    if (!ok) return;
    try { await deleteSession(id); await loadAll(); }
    catch { alert('Could not delete the session — is the backend running?'); }
  });

  loadAll();
</script>
</body>
</html>
