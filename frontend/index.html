<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Buddy — Today</title>
  <script src="js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="page-header">
  <div class="page-header-row max-w-5xl mx-auto">
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <circle cx="13" cy="13" r="11.5" stroke="var(--accent)" stroke-width="2"/>
        <circle cx="13" cy="13" r="6.5" stroke="var(--accent)" stroke-width="2"/>
        <circle cx="13" cy="13" r="2" fill="var(--accent)"/>
      </svg>
      <h1>Focus Buddy</h1>
    </a>
    <nav class="page-nav" aria-label="Main navigation">
      <a href="plan.html">Plan</a>
      <a href="index.html" class="active" aria-current="page">Today</a>
      <a href="analytics.html">Analytics</a>
      <a href="#" id="about-nav" role="button">About me</a>
      <div class="settings-menu" style="position:relative">
        <button id="settings-btn" class="settings-trigger" aria-label="Settings" title="Settings" aria-haspopup="dialog" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </nav>
  </div>
</header>

<main class="app-main app-main-wide today-main max-w-5xl mx-auto px-6 py-8">
  <div class="today-grid">

    <section class="today-primary flex flex-col gap-5">
      <div class="card task-composer">
        <p class="section-label">New task</p>
        <form id="add-form" class="flex flex-col gap-3">
          <div>
            <label for="task-input" class="block text-xs font-medium mb-1.5" style="color:var(--text-muted)">Task name</label>
            <input id="task-input" class="input" type="text" placeholder="What do you want to focus on?"
                   autocomplete="off" required aria-label="Task name" />
          </div>
          <div>
            <label for="task-desc" class="block text-xs font-medium mb-1.5" style="color:var(--text-muted)">
              Description <span class="font-normal" style="color:var(--text-faint)"> — Add needed websites, tools, or context for focus analysis</span>
            </label>
            <textarea id="task-desc" class="input" rows="3"
                      placeholder="Please add context or details about this task."
                      style="resize:vertical;min-height:58px;line-height:1.5" aria-label="Task description"></textarea>
          </div>
          <div class="flex justify-end">
            <button id="add-btn" type="submit" class="btn-primary" disabled
                    style="opacity:0.5;cursor:not-allowed">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Add Task
            </button>
          </div>
        </form>
      </div>

      <div class="task-stack">
        <p class="section-label">Tasks</p>
        <div id="task-list" class="flex flex-col gap-3"></div>
        <div id="active-empty" class="flex flex-col items-center gap-2 text-center py-10">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8M13 12h8M13 18h8"/></svg>
          <p class="font-medium text-sm" style="color:var(--text)">No active tasks</p>
          <p id="active-empty-sub" class="text-sm" style="color:var(--text-faint)">Add a task above to start your first focus session.</p>
        </div>

        <button id="completed-header" class="completed-header collapsed" style="display:none" aria-expanded="false">
          <span class="chev" style="display:inline-flex"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M6 9l6 6 6-6"/></svg></span> <span id="completed-label">Completed (0)</span>
        </button>
        <div id="completed-list" class="flex flex-col gap-3" style="display:none"></div>
      </div>
    </section>

    <section class="today-rail">
      <div id="focus-goal-card" class="card focus-goal-card mb-4"></div>
      <div class="flex items-center justify-between mb-2">
        <p class="section-label" style="margin:0">Today</p>
        <p id="cal-date" class="text-xs" style="color:var(--text-faint)"></p>
      </div>
      <div class="calendar" id="calendar">
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div id="cal-empty" class="flex flex-col items-center gap-2 text-center mt-3" style="display:none">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        <p class="text-xs" style="color:var(--text-faint)">No sessions today yet — start one from a task.</p>
      </div>
    </section>

  </div>
</main>

<!-- Edit-task modal -->
<div id="edit-overlay" class="modal-overlay" style="display:none">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-title" style="max-width:420px">
    <h2 id="edit-title" class="serif" style="font-size:1.15rem;font-weight:600;margin:0 0 14px">Edit task</h2>
    <label for="edit-name" class="block text-xs font-medium mb-1.5" style="color:var(--text-muted)">Task name</label>
    <input id="edit-name" class="input" type="text" autocomplete="off" aria-label="Task name" />
    <label for="edit-desc" class="block text-xs font-medium mb-1.5 mt-3" style="color:var(--text-muted)">Description</label>
    <textarea id="edit-desc" class="input" rows="3" style="resize:vertical" aria-label="Task description"></textarea>
    <div class="flex gap-3 justify-end mt-4">
      <button id="edit-cancel" class="btn-ghost">Cancel</button>
      <button id="edit-save" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/notify.js"></script>
<script src="js/settings-menu.js"></script>
<script src="js/planning-insights.js"></script>
<script>
  const HOUR_HEIGHT = 52;
  const MIN_BLOCK = 18;

  const taskListEl     = document.getElementById('task-list');
  const completedListEl = document.getElementById('completed-list');
  const completedHeader = document.getElementById('completed-header');
  const completedLabel  = document.getElementById('completed-label');
  const activeEmpty     = document.getElementById('active-empty');

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
  function formatSeconds(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}m ${sec}s`;
  }

  const ICON_PENCIL = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
  const ICON_TRASH  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>';
  let _todayPlan = null;
  let _todayReality = null;
  let _recommendedEntry = null;
  let _allSessions = [];

  function planEntryForTask(taskId) {
    return (window.PlanningInsights ? PlanningInsights.parsePlanEntries(_todayPlan) : [])
      .find(e => e.task_id === Number(taskId)) || null;
  }

  function trackerHref(task) {
    const entry = planEntryForTask(task.id);
    const params = new URLSearchParams({ taskId: String(task.id) });
    if (entry) {
      params.set('planDate', PlanningInsights.localDayKey());
      params.set('plannedEstimate', String(entry.estimate_min || 0));
      if (Number.isInteger(entry.scheduled_min)) params.set('plannedStart', String(entry.scheduled_min));
      if (_recommendedEntry && _recommendedEntry.task_id === entry.task_id) params.set('recommended', '1');
    }
    return `tracker.html?${params.toString()}`;
  }

  function fmtClock(min) {
    min = ((Number(min) % 1440) + 1440) % 1440;
    const h = Math.floor(min / 60);
    const m = min % 60;
    const ap = h < 12 ? 'am' : 'pm';
    return `${h % 12 || 12}:${String(m).padStart(2, '0')}${ap}`;
  }

  function renderTaskCard(task) {
    if (task.completed) {
      const row = document.createElement('div');
      row.className = 'flex items-center gap-3';
      row.style.cssText = 'padding:0.45rem 0.5rem';
      row.innerHTML = `
        <button class="check done" data-id="${task.id}" data-completed="true" data-action="toggle"
                aria-label="Mark &quot;${escapeHtml(task.name)}&quot; as not done"
                title="Mark incomplete"></button>
        <span class="serif task-title-done flex-1 min-w-0 truncate" style="font-size:0.95rem">${escapeHtml(task.name)}</span>
        <button class="icon-btn danger" data-id="${task.id}" data-action="delete"
                aria-label="Delete &quot;${escapeHtml(task.name)}&quot;" title="Delete">${ICON_TRASH}</button>
      `;
      return row;
    }

    const card = document.createElement('div');
    const entry = planEntryForTask(task.id);
    const suggested = _recommendedEntry && _recommendedEntry.task_id === Number(task.id);
    card.className = `card card-hover flex items-center gap-3 ${suggested ? 'is-plan-suggested' : ''}`;
    card.style.cssText = 'position:relative;overflow:hidden;padding-left:1.25rem';
    const planChip = entry
      ? `<span class="plan-handoff-chip ${suggested ? 'suggested' : ''}">${suggested ? 'Next up' : 'Today plan'}${Number.isInteger(entry.scheduled_min) ? ` - ${fmtClock(entry.scheduled_min)}` : ''}</span>`
      : '';
    card.innerHTML = `
      <span aria-hidden="true" style="position:absolute;left:0;top:0;height:100%;width:4px;background:var(--accent)"></span>
      <button class="check" data-id="${task.id}" data-completed="false" data-action="toggle"
              aria-label="Mark &quot;${escapeHtml(task.name)}&quot; as done"
              title="Mark complete"></button>
      <div class="min-w-0 flex-1">
        <p class="serif" style="font-size:0.95rem;font-weight:500;color:var(--text);line-height:1.35">${escapeHtml(task.name)}</p>
        ${planChip}
        ${task.description
          ? `<p class="text-xs mt-0.5 leading-relaxed" style="color:var(--text-faint)">${escapeHtml(task.description)}</p>`
          : ''}
      </div>
      <button class="icon-btn" data-id="${task.id}" data-action="edit"
              aria-label="Edit &quot;${escapeHtml(task.name)}&quot;" title="Edit">${ICON_PENCIL}</button>
      <button class="icon-btn danger" data-id="${task.id}" data-action="delete"
              aria-label="Delete &quot;${escapeHtml(task.name)}&quot;" title="Delete">${ICON_TRASH}</button>
      <a href="${trackerHref(task)}"
         class="btn-primary text-sm flex-shrink-0"
         aria-label="Start session for ${escapeHtml(task.name)}">
        ${suggested ? 'Start next' : 'Start'}
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    `;
    return card;
  }

  let _tasks = [];
  let editId = null;

  function renderFocusGoal(sessions = _allSessions) {
    const box = document.getElementById('focus-goal-card');
    if (!box || !window.PlanningInsights) return;
    const goal = PlanningInsights.focusGoalMin();
    const todayKey = PlanningInsights.localDayKey();
    const progress = PlanningInsights.focusGoalProgress(sessions, todayKey, goal);
    const streak = PlanningInsights.focusStreak(sessions, goal, todayKey);
    const options = [
      [0, 'Off'],
      [30, '30m'],
      [60, '60m'],
      [90, '90m'],
      [120, '120m'],
    ].map(([value, label]) => `<option value="${value}" ${goal === value ? 'selected' : ''}>${label}</option>`).join('');
    const line = goal <= 0
      ? 'Daily focus goal is off.'
      : progress.met
        ? 'Goal met today.'
        : `${Math.max(0, goal - progress.focused_min)}m left for today's focus goal.`;
    const streakLine = goal <= 0
      ? 'Turn it on when a daily target would help.'
      : streak.count
        ? `${streak.count}-day rhythm${streak.includes_today ? ' including today' : ' through yesterday'}.`
        : 'Fresh start today.';
    const goalAria = goal > 0
      ? `${progress.focused_min} of ${goal} focused minutes`
      : 'Daily focus goal off';
    box.innerHTML = `
      <div class="focus-goal-head">
        <div>
          <p class="section-label" style="margin:0 0 2px">Focus goal</p>
          <p class="text-xs" style="color:var(--text-muted);margin:0">${escapeHtml(line)}</p>
        </div>
        <select id="focus-goal-select" class="input focus-goal-select" aria-label="Daily focus goal">${options}</select>
      </div>
      <div class="focus-goal-meter" role="progressbar" aria-valuemin="0" aria-valuemax="${Math.max(1, goal)}"
           aria-valuenow="${goal > 0 ? progress.focused_min : 0}" aria-label="${escapeHtml(goalAria)}">
        <span style="width:${goal > 0 ? progress.pct : 0}%"></span>
      </div>
      <p class="text-xs" style="color:var(--text-faint);margin:8px 0 0">
        ${goal > 0 ? `${progress.focused_min}/${goal} focused minutes - ` : ''}${escapeHtml(streakLine)}
      </p>`;
    const select = document.getElementById('focus-goal-select');
    if (select) select.addEventListener('change', () => {
      PlanningInsights.setFocusGoalMin(parseInt(select.value, 10));
      renderFocusGoal(sessions);
    });
  }

  async function toggleComplete(id, currentlyCompleted) {
    try {
      await updateTask(id, { completed: !currentlyCompleted });
      await loadTasks();
    } catch {
      showToast('Could not update the task — is the backend running?', { danger: true });
    }
  }

  async function deleteTaskFlow(id) {
    const t = _tasks.find(x => x.id === id);
    const name = t ? t.name : 'this task';
    const ok = await confirmDialog(
      `Delete "${name}" and its sessions? This can't be undone.`,   // confirmDialog escapes internally
      { danger: true, confirmText: 'Delete' });
    if (!ok) return;
    try {
      await deleteTask(id);
      await loadTasks();
      await loadCalendar();
    } catch {
      showToast('Could not delete the task — is the backend running?', { danger: true });
    }
  }

  function openEdit(id) {
    const t = _tasks.find(x => x.id === id);
    if (!t) return;
    editId = id;
    document.getElementById('edit-name').value = t.name;
    document.getElementById('edit-desc').value = t.description || '';
    document.getElementById('edit-overlay').style.display = 'flex';
    document.getElementById('edit-name').focus();
  }

  function onListClick(e) {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const id = parseInt(el.dataset.id, 10);
    const action = el.dataset.action;
    if (action === 'toggle') toggleComplete(id, el.dataset.completed === 'true');
    else if (action === 'delete') deleteTaskFlow(id);
    else if (action === 'edit') openEdit(id);
  }
  taskListEl.addEventListener('click', onListClick);
  completedListEl.addEventListener('click', onListClick);

  completedHeader.addEventListener('click', () => {
    const collapsed = completedHeader.classList.toggle('collapsed');
    completedHeader.setAttribute('aria-expanded', String(!collapsed));
    completedListEl.style.display = collapsed ? 'none' : 'flex';
  });

  async function loadTasks() {
    try {
      const tasks = await getTasks();
      _tasks = tasks;
      const todayKey = window.PlanningInsights ? PlanningInsights.localDayKey() : null;
      _todayPlan = null;
      _todayReality = null;
      _recommendedEntry = null;
      if (todayKey && window.getPlan) {
        try {
          _todayPlan = await getPlan(todayKey);
          if (_todayPlan && window.getPlanReality) {
            _todayReality = await getPlanReality(todayKey, PlanningInsights.dayBounds(todayKey));
          }
          _recommendedEntry = PlanningInsights.recommendedPlanEntry(_todayPlan, tasks, _todayReality);
        } catch {
          _todayPlan = null;
          _todayReality = null;
          _recommendedEntry = null;
        }
      }
      const active = tasks.filter(t => !t.completed);
      // "Completed" resets daily: only show tasks completed today (local date).
      const done   = tasks.filter(t => t.completed && t.completed_at && isToday(new Date(t.completed_at)));

      taskListEl.innerHTML = '';
      completedListEl.innerHTML = '';
      activeEmpty.style.display = active.length ? 'none' : 'flex';
      document.getElementById('active-empty-sub').textContent = done.length
        ? 'All tasks completed — add another above to keep going.'
        : 'Add a task above to start your first focus session.';

      active.forEach(t => taskListEl.appendChild(renderTaskCard(t)));
      done.forEach(t => completedListEl.appendChild(renderTaskCard(t)));

      if (done.length) {
        completedHeader.style.display = 'flex';
        completedLabel.textContent = `Completed (${done.length})`;
      } else {
        completedHeader.style.display = 'none';
        completedListEl.style.display = 'none';
        completedHeader.classList.add('collapsed');
      }
    } catch {
      activeEmpty.style.display = 'none';
      taskListEl.innerHTML = `
        <div class="card text-center py-6" style="border-color: var(--terracotta-soft)">
          <p class="text-sm font-medium" style="color:var(--terracotta)">Backend not running</p>
          <p class="text-xs mt-1" style="color:var(--text-muted)">
            Start it with: <code style="background:var(--surface-2);padding:1px 5px;border-radius:4px">uvicorn backend.main:app --reload</code>
          </p>
        </div>`;
    }
  }

  function isToday(d) {
    const n = new Date();
    return d.getFullYear() === n.getFullYear()
        && d.getMonth() === n.getMonth()
        && d.getDate() === n.getDate();
  }
  function hourLabel(h) {
    const ampm = h < 12 ? 'AM' : 'PM';
    let hr = h % 12; if (hr === 0) hr = 12;
    return `${hr} ${ampm}`;
  }
  function dominantState(s) {
    const states = ['focused', 'distracted', 'uncertain', 'away'];
    const vals = [s.seconds_focused, s.seconds_distracted, s.seconds_uncertain, s.seconds_away];
    let max = -1, idx = 2;
    vals.forEach((v, i) => { if (v > max) { max = v; idx = i; } });
    return max <= 0 ? 'uncertain' : states[idx];
  }

  function placeNowLine(grid) {
    let line = grid.querySelector('.cal-now-line');
    if (!line) {
      line = document.createElement('div');
      line.className = 'cal-now-line';
      grid.appendChild(line);
    }
    const now = new Date();
    line.style.top = ((now.getHours() * 60 + now.getMinutes()) / 60 * HOUR_HEIGHT) + 'px';
    return parseFloat(line.style.top);
  }

  async function loadCalendar() {
    const grid = document.getElementById('cal-grid');
    grid.style.height = (24 * HOUR_HEIGHT) + 'px';
    grid.innerHTML = '';

    for (let h = 0; h < 24; h++) {
      const row = document.createElement('div');
      row.className = 'cal-hour-row';
      row.style.top = (h * HOUR_HEIGHT) + 'px';
      row.innerHTML = `<span class="cal-hour-label">${hourLabel(h)}</span>`;
      grid.appendChild(row);
    }

    let count = 0;
    let loadFailed = false;
    try {
      const sessions = await getSessions();
      _allSessions = sessions || [];
      renderFocusGoal(_allSessions);
      sessions.forEach(s => {
        const start = new Date(s.started_at);
        if (!isToday(start)) return;
        let end = new Date(s.ended_at);
        if (!(end > start)) end = new Date(start.getTime() + 60000);

        const startMin = start.getHours() * 60 + start.getMinutes() + start.getSeconds() / 60;
        const top = startMin / 60 * HOUR_HEIGHT;
        const durMin = (end - start) / 60000;
        let height = Math.max(MIN_BLOCK, durMin / 60 * HOUR_HEIGHT);
        if (top + height > 24 * HOUR_HEIGHT) height = 24 * HOUR_HEIGHT - top;

        const total = s.seconds_focused + s.seconds_distracted + s.seconds_uncertain + s.seconds_away;
        const pct = total > 0 ? Math.round(s.seconds_focused / total * 100) : 0;

        const block = document.createElement('div');
        block.className = `cal-block ${dominantState(s)}`;
        block.style.top = top + 'px';
        block.style.height = height + 'px';
        block.title = `${s.task_name} · ${pct}% focused · ${formatSeconds(total)}`;
        block.innerHTML = `<span class="font-medium">${escapeHtml(s.task_name)}</span> <span class="cal-block-pct">${pct}%</span>`;
        block.addEventListener('click', () => { location.href = 'analytics.html'; });
        grid.appendChild(block);
        count++;
      });
    } catch {
      loadFailed = true;
    }

    const nowTop = placeNowLine(grid);
    const emptyEl = document.getElementById('cal-empty');
    const emptyMsg = emptyEl.querySelector('p');
    if (emptyMsg) {
      emptyMsg.textContent = loadFailed
        ? "Couldn't load today's sessions — is the backend running?"
        : 'No sessions today yet — start one from a task.';
    }
    emptyEl.style.display = count ? 'none' : 'flex';

    const cal = document.getElementById('calendar');
    cal.scrollTop = Math.max(0, nowTop - 140);
  }

  document.getElementById('cal-date').textContent =
    new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });

  const addBtn   = document.getElementById('add-btn');
  const nameInput = document.getElementById('task-input');
  const ADD_LABEL = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Add Task`;

  function setAddEnabled(enabled) {
    addBtn.disabled = !enabled;
    addBtn.style.opacity = enabled ? '1' : '0.5';
    addBtn.style.cursor = enabled ? 'pointer' : 'not-allowed';
  }
  nameInput.addEventListener('input', () => setAddEnabled(nameInput.value.trim().length > 0));

  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    if (!name) return;
    const desc = document.getElementById('task-desc').value.trim();
    setAddEnabled(false);
    addBtn.textContent = 'Adding…';
    try {
      await createTask(name, desc);
      nameInput.value = '';
      document.getElementById('task-desc').value = '';
      await loadTasks();
    } catch {
      showToast('Failed to create task — make sure the backend is running.', { danger: true });
    } finally {
      addBtn.innerHTML = ADD_LABEL;
      setAddEnabled(nameInput.value.trim().length > 0);
    }
  });

  // Edit-task modal wiring
  const editOverlay = document.getElementById('edit-overlay');
  function closeEdit() { editOverlay.style.display = 'none'; editId = null; }
  document.getElementById('edit-cancel').addEventListener('click', closeEdit);
  editOverlay.addEventListener('click', e => { if (e.target === editOverlay) closeEdit(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && editOverlay.style.display === 'flex') closeEdit(); });
  document.getElementById('edit-save').addEventListener('click', async () => {
    const name = document.getElementById('edit-name').value.trim();
    if (!name) { document.getElementById('edit-name').focus(); return; }
    const description = document.getElementById('edit-desc').value.trim();
    try {
      await updateTask(editId, { name, description });
      closeEdit();
      await loadTasks();
    } catch {
      showToast('Could not save the task — is the backend running?', { danger: true });
    }
  });

  // Ctrl/Cmd+Enter in the description box submits the add-task form
  document.getElementById('task-desc').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      document.getElementById('add-form').requestSubmit();
    }
  });

  loadTasks();
  renderFocusGoal([]);
  loadCalendar();
  setInterval(() => {
    const grid = document.getElementById('cal-grid');
    if (grid) placeNowLine(grid);
  }, 60000);
</script>
</body>
</html>
