services:
  - type: web
    name: focus-buddy-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: focus-buddy-demo-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: COACHING_MODEL
        value: gemini-3.5-flash
      - key: FOCUS_BUDDY_CORS_ORIGINS
        sync: false

databases:
  - name: focus-buddy-demo-db
    plan: free
